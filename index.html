<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🎬 Movie Hub</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background:#0f0f0f;
  color:white;
}

/* Header */
header{
  text-align:center;
  padding:15px 10px;
  background:#000;
  position:sticky;
  top:0;
  z-index:1000;
}

header h2{
  margin:5px 0;
  font-size:22px;
}

input{
  padding:12px;
  width:95%;
  max-width:450px;
  margin-top:10px;
  border-radius:25px;
  border:none;
  outline:none;
  font-size:14px;
}

/* Movie Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

@media(min-width:768px){
  .grid{
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  }
}

/* Card */
.card{
  background:#1c1c1c;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s ease;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:240px;
  object-fit:cover;
}

.card p{
  text-align:center;
  padding:10px;
  font-size:14px;
}

/* Pagination */
.pagination{
  text-align:center;
  padding:20px 10px;
}

.pagination button{
  margin:4px;
  padding:8px 14px;
  background:#222;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:20px;
  font-size:13px;
  transition:0.2s;
}

.pagination button:hover{
  background:#ff3d00;
}

.pagination button.active{
  background:#ff3d00;
}

/* Footer */
footer{
  text-align:center;
  padding:15px;
  background:#000;
  font-size:13px;
  margin-top:20px;
}

footer a{
  color:#00e5ff;
  text-decoration:none;
}

/* Mobile Optimization */
@media(max-width:480px){
  .grid{
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }

  .card img{
    height:210px;
  }

  header h2{
    font-size:18px;
  }
}
</style>
</head>

<body>

<header>
<h2>🎬 Movie Hub</h2>
<input id="search" placeholder="Search movie..." onkeyup="renderMovies(1)">
</header>

<div id="movies" class="grid"></div>
<div id="pages" class="pagination"></div>

<footer>
© 2026 Movie Hub |
<a href="https://t.me/+gbs_WjaSJP4wMzhl" target="_blank">Join Telegram</a>
</footer>

<script>
const movies = [
{
title:"Sarvam Maya 2025 Hindi Dual Audio WEB-DL",
poster:"images/poster/poster-sarvam-maya-.webp",
desc:"A young Hindu priest's peaceful life is disrupted when he meets a spirit. What starts as a supernatural challenge evolves into a profound journey that tests his faith and makes him question everything he knows.",
info:`Movie Name : Sarvam Maya
Language   : Hindi
Run Time   : 2h 26m
Genres     : Comedy and Horror
`,  
download:"https://nexdrive.blog/genxfm805649493943674/",
shots:[
"images/screenshot/screenshot-sarvam-maya.webp",
"images/screenshot/screenshot-sarvam-maya-202552.webp",
"images/screenshot/",
"images/screenshot/",
]
},

];

const perPage = 20;
let currentPage = 1;

function renderMovies(page=1){

currentPage = page;

let list=[...movies];
let s=document.getElementById("search").value.toLowerCase();

if(s){
list=list.filter(m=>m.title.toLowerCase().includes(s));
}

const start=(page-1)*perPage;
const end=start+perPage;

const box=document.getElementById("movies");
box.innerHTML="";

list.slice(start,end).forEach(m=>{
const index = movies.findIndex(x => x.title === m.title);
box.innerHTML += `
<div class="card" onclick="openMovie(${index})">
<img src="${m.poster}" onerror="this.src='https://via.placeholder.com/300x400?text=No+Image'">
<p>${m.title}</p>
</div>`;
});

createPagination(list.length);
}

function createPagination(total){

const pages=Math.ceil(total/perPage);
const box=document.getElementById("pages");
box.innerHTML="";

for(let i=1;i<=pages;i++){
box.innerHTML+=`
<button class="${i===currentPage?'active':''}"
onclick="renderMovies(${i})">${i}</button>`;
}
}

function openMovie(i){
localStorage.setItem("movie", JSON.stringify(movies[i]));
window.location="movie.html";
}

renderMovies();
</script>

</body>
</html>
